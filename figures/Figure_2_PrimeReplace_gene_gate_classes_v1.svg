<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1200" viewBox="0 0 1700 1200">
<rect width="100%" height="100%" fill="#ffffff"/>
<style><![CDATA[text{font-family:Arial,Helvetica,sans-serif;fill:#1f2933}.panel{font-size:18px;font-weight:700}.small{font-size:12px;fill:#5d6977}.label{font-size:14px;fill:#1f2933}.tiny{font-size:10px;fill:#5d6977}.num{font-size:22px;font-weight:700;fill:#2f5f9f}.axis{font-size:12px;fill:#5d6977}]]></style>
<text x="60.0" y="70.0" class="panel" text-anchor="start">A</text>
<text x="90.0" y="70.0" class="panel" text-anchor="start">Low-record-burden gate</text>
<rect x="110.0" y="145.0" width="1050.0" height="70.0" rx="4.0" fill="#ffffff" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="110.0" y="145.0" width="633.0" height="70.0" rx="0.0" fill="#dbe2ea" stroke="#dbe2ea" stroke-width="1.0"/>
<rect x="743.0" y="145.0" width="417.0" height="70.0" rx="0.0" fill="#d7ebe7" stroke="#d7ebe7" stroke-width="1.0"/>
<text x="110.0" y="127.0" class="small" text-anchor="start">5,738 all-mapped genes</text>
<text x="426.5" y="187.0" class="label" text-anchor="middle">3,459 low-record</text>
<text x="951.5" y="187.0" class="label" text-anchor="middle">2,279 interpretable</text>
<text x="110.0" y="257.0" class="small" text-anchor="start">Low-record gate: fewer than 20 ClinVar P/LP records.</text>
<text x="60.0" y="350.0" class="panel" text-anchor="start">B</text>
<text x="90.0" y="350.0" class="panel" text-anchor="start">Gene-level architecture labels</text>
<text x="120.0" y="432.0" class="label" text-anchor="start">Downstream-CDS record-coverage hypothesis</text>
<rect x="550.0" y="410.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="410.0" width="650.0" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="1212.0" y="433.0" class="label" text-anchor="start">1,720</text>
<text x="120.0" y="504.0" class="label" text-anchor="start">Downstream-CDS with context burden</text>
<rect x="550.0" y="482.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="482.0" width="71.8" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="633.8" y="505.0" class="label" text-anchor="start">190</text>
<text x="120.0" y="576.0" class="label" text-anchor="start">Local exon/block record cluster</text>
<rect x="550.0" y="554.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="554.0" width="71.0" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="633.0" y="577.0" class="label" text-anchor="start">188</text>
<text x="120.0" y="648.0" class="label" text-anchor="start">Large-payload / donor-burden stress</text>
<rect x="550.0" y="626.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="626.0" width="34.0" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="596.0" y="649.0" class="label" text-anchor="start">90</text>
<text x="120.0" y="720.0" class="label" text-anchor="start">Tumor-predisposition control</text>
<rect x="550.0" y="698.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="698.0" width="13.2" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="575.2" y="721.0" class="label" text-anchor="start">35</text>
<text x="120.0" y="792.0" class="label" text-anchor="start">Single-exon record cluster</text>
<rect x="550.0" y="770.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="770.0" width="11.7" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="573.7" y="793.0" class="label" text-anchor="start">31</text>
<text x="120.0" y="864.0" class="label" text-anchor="start">Diffuse/moderate architecture</text>
<rect x="550.0" y="842.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="842.0" width="7.9" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="569.9" y="865.0" class="label" text-anchor="start">21</text>
<text x="120.0" y="936.0" class="label" text-anchor="start">Mechanism-complex limitation</text>
<rect x="550.0" y="914.0" width="650.0" height="34.0" rx="4.0" fill="#f4f7fa" stroke="#cbd5df" stroke-width="1.0"/>
<rect x="550.0" y="914.0" width="1.5" height="34.0" rx="4.0" fill="#2f5f9f" stroke="#2f5f9f" stroke-width="1.0"/>
<text x="563.5" y="937.0" class="label" text-anchor="start">4</text>
<text x="120.0" y="1040.0" class="small" text-anchor="start">Counts are genes after the low-record gate.</text>
<text x="1190.0" y="350.0" class="panel" text-anchor="start">C</text>
<text x="1220.0" y="350.0" class="panel" text-anchor="start">Interpretation rule</text>
<rect x="1210.0" y="410.0" width="350.0" height="355.0" rx="6.0" fill="#ffffff" stroke="#cbd5df" stroke-width="1.0"/>
<text x="1240.0" y="455.0" class="label" text-anchor="start">Labels summarize architecture, not</text>
<text x="1240.0" y="470.0" class="label" text-anchor="start">suitability.</text>
<text x="1240.0" y="530.0" class="label" text-anchor="start">Coverage is interpreted with payload</text>
<text x="1240.0" y="545.0" class="label" text-anchor="start">and context.</text>
<text x="1240.0" y="605.0" class="label" text-anchor="start">Sparse records are flagged before</text>
<text x="1240.0" y="620.0" class="label" text-anchor="start">class interpretation.</text>
<text x="1240.0" y="680.0" class="label" text-anchor="start">Downstream-CDS is a boundary-based</text>
<text x="1240.0" y="695.0" class="label" text-anchor="start">hypothesis.</text>
</svg>
